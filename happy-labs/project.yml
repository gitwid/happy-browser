name: HappyJournal
options:
  bundleIdPrefix: com.happylabs
  deploymentTarget:
    iOS: "17.0"
packages:
  HappyLabsCore:
    path: Packages/HappyLabsCore
targets:
  HappyJournal:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: HappyJournaliOS
    dependencies:
      - package: HappyLabsCore
        product: HappyLabsCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.happylabs.HappyJournal
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 1
        DEVELOPMENT_TEAM: ""
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Happy Journal
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
  HappyJournalUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: HappyJournalUITests
    dependencies:
      - target: HappyJournal
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.happylabs.HappyJournalUITests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  HappyJournal:
    build:
      targets:
        HappyJournal: all
        HappyJournalUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - HappyJournalUITests
